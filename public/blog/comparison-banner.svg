<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A1A"/>
      <stop offset="0.55" stop-color="#10172b"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="ecm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00FF87"/>
      <stop offset="1" stop-color="#60EFFF"/>
    </linearGradient>
    <linearGradient id="zeoob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B7CF6"/>
      <stop offset="1" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="ts" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C1A6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle top label -->
  <text x="600" y="120" text-anchor="middle" fill="#ffffff" fill-opacity="0.55" font-size="26" font-weight="600" letter-spacing="0.5">Fake chat makers, compared</text>

  <!-- ===== TextingStory ===== -->
  <g transform="translate(230,305)">
    <rect x="-52" y="-52" width="104" height="104" rx="26" fill="url(#ts)"/>
    <!-- speech bubble glyph -->
    <path d="M-26 -20 h44 a12 12 0 0 1 12 12 v16 a12 12 0 0 1 -12 12 h-24 l-16 13 v-13 h-4 a12 12 0 0 1 -12 -12 v-16 a12 12 0 0 1 12 -12 z" fill="#ffffff" fill-opacity="0.95"/>
    <text x="0" y="92" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="30" font-weight="700">TextingStory</text>
  </g>

  <text x="415" y="317" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" font-size="30" font-style="italic" font-weight="600">vs</text>

  <!-- ===== Easy Chat Maker (highlighted) ===== -->
  <g transform="translate(600,299)">
    <circle cx="0" cy="0" r="86" fill="#00FF87" fill-opacity="0.10" filter="url(#glow)"/>
    <rect x="-62" y="-62" width="124" height="124" rx="30" fill="url(#ecm)"/>
    <path d="M-30 -24 h52 a14 14 0 0 1 14 14 v20 a14 14 0 0 1 -14 14 h-28 l-20 16 v-16 h-4 a14 14 0 0 1 -14 -14 v-20 a14 14 0 0 1 14 -14 z" fill="#0A0A1A" fill-opacity="0.88"/>
    <text x="0" y="108" text-anchor="middle" font-size="34" font-weight="800" fill="url(#ecm)">Easy Chat Maker</text>
  </g>

  <text x="800" y="317" text-anchor="middle" fill="#ffffff" fill-opacity="0.35" font-size="30" font-style="italic" font-weight="600">vs</text>

  <!-- ===== Zeoob ===== -->
  <g transform="translate(970,305)">
    <rect x="-52" y="-52" width="104" height="104" rx="26" fill="url(#zeoob)"/>
    <path d="M-26 -20 h44 a12 12 0 0 1 12 12 v16 a12 12 0 0 1 -12 12 h-24 l-16 13 v-13 h-4 a12 12 0 0 1 -12 -12 v-16 a12 12 0 0 1 12 -12 z" fill="#ffffff" fill-opacity="0.95"/>
    <text x="0" y="92" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="30" font-weight="700">Zeoob</text>
  </g>

  <!-- bottom feature strip -->
  <text x="600" y="560" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-size="24" font-weight="500">Screenshots &#160;&#8226;&#160; Videos &#160;&#8226;&#160; 9 platforms &#160;&#8226;&#160; No watermark</text>
</svg>
